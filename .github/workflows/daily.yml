name: remisedebail carrousel quotidien
on:
  schedule:
    - cron: '20 8,10,13 * * *'   # 3 tentatives/jour (10h20, 12h20, 15h20 Suisse), resiste aux retards GitHub
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Publier le carrousel du jour (IG + FB)
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python publish_daily.py
      - name: Enregistrer l'etat (anti-doublon)
        run: |
          if [[ -n "$(git status --porcelain last.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add last.json && git commit -m "etat: publie le $(TZ=Europe/Zurich date +%F)" && git push
          fi
